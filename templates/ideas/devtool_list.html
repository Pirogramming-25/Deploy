{% extends 'base.html' %}

{% block title %}개발툴 · SWIDEA{% endblock %}

{% block body %}
<header class="page-head">
  <div>
    <p class="eyebrow">DEV TOOLS</p>
    <h1>개발툴 관리</h1>
  </div>
  <a href="{% url 'devtool_create' %}" class="btn">+ 개발툴 등록</a>
</header>

<div class="tool-list">
  {% for tool in devtools %}
    <div class="tool-row">
      <a href="{% url 'devtool_detail' tool.id %}" class="tool-name">{{ tool.name }}</a>
      <span class="tool-kind">{{ tool.get_kind_display }}</span>
      <span class="tool-count">{{ tool.num_ideas }}개 아이디어</span>
    </div>
  {% empty %}
    <p class="empty">등록된 개발툴이 없습니다.</p>
  {% endfor %}
</div>
{% endblock %}
